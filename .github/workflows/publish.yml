name: Publish to Modrinth

# This triggers the workflow whenever a new GitHub Release is published
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build
      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/libs/

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: 'iuZL1bXB' # Replace with the Modrinth project slug or Identifier (ID)
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: 'build/libs/!(*-@(dev|sources|javadoc)).jar'
          name: ${{ github.event.release.name }}
          version: ${{ github.event.release.tag_name }}
          version-type: beta
          changelog: ${{ github.event.release.body }}
          loaders: fabric # e.g., fabric, forge, neoforge
          # Replace with the supported Minecraft versions
          game-versions: |
            1.21.11
